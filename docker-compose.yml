services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: agentconsole
      POSTGRES_PASSWORD: agentconsole
      POSTGRES_DB: agentconsole
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://agentconsole:agentconsole@db:5432/agentconsole
      NEXTAUTH_SECRET: dev-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - db

volumes:
  pgdata:
